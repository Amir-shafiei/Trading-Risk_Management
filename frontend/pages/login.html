<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | TradeRisk</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="logo">TRADE<span>RISK</span></div>
        <p class="auth-subtitle">به حساب خود وارد شوید</p>

        <div class="alert" id="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" id="username" placeholder="نام کاربری خود را وارد کنید">
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" id="password" placeholder="رمز عبور خود را وارد کنید">
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">ورود</button>
        </form>

        <p class="auth-link">حساب ندارید؟ <a href="/register">ثبت‌نام کنید</a></p>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
