<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد | TradeRisk</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">

    <button class="hamburger" id="hamburgerBtn"><i class="ti ti-menu-2"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="logo">TRADE<span>RISK</span></div>
        <nav class="nav">
            <a href="/dashboard" class="nav-item active"><i class="ti ti-layout-dashboard"></i>داشبورد</a>
            <a href="/trades" class="nav-item"><i class="ti ti-chart-candle"></i>تریدها</a>
            <a href="/portfolio" class="nav-item"><i class="ti ti-wallet"></i>پورتفولیو</a>
            <a href="/journal" class="nav-item"><i class="ti ti-notebook"></i>ژورنال</a>
            <a href="/badges" class="nav-item"><i class="ti ti-medal"></i>نشان‌ها</a>
            <a href="/news" class="nav-item"><i class="ti ti-calendar-event"></i>تقویم اقتصادی</a>
            <a href="/settings" class="nav-item"><i class="ti ti-settings"></i>تنظیمات</a>
        </nav>
        <button class="logout-btn" id="logoutBtn"><i class="ti ti-logout"></i>خروج</button>
    </aside>

    <main class="main">
        <div class="topbar">
            <h1 class="page-title">داشبورد</h1>
            <div class="topbar-right">
                <div class="alert-bell" id="alertBell">
                    <i class="ti ti-bell"></i>
                    <span class="alert-badge" id="alertCount"></span>
                    <div class="alert-dropdown" id="alertDropdown">
                        <div class="alert-dropdown-header">
                            <span>اعلان‌ها</span>
                            <button class="alert-check-btn" id="checkAlertsBtn"><i class="ti ti-refresh"></i> بررسی</button>
                        </div>
                        <div class="alert-dropdown-body" id="alertList"></div>
                    </div>
                </div>
                <div class="user-info">
                    <span class="user-name" id="userName">کاربر</span>
                    <div class="avatar">A</div>
                </div>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div>
            <div class="stat-card"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div>
            <div class="stat-card"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div>
            <div class="stat-card"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div>
        </div>

        <div class="main-grid">
            <div class="left-col">
                <div class="card">
                    <div class="card-title"><i class="ti ti-chart-line"></i>نمودار PnL تجمعی</div>
                    <div class="chart-wrap">
                        <canvas id="pnlChart"></canvas>
                        <div class="chart-empty" id="chartEmpty">داده‌ای برای نمایش وجود ندارد</div>
                    </div>
                </div>

                <div class="card" style="margin-top:16px">
                    <div class="card-title"><i class="ti ti-chart-area"></i>منحنی سرمایه</div>
                    <div class="chart-wrap">
                        <canvas id="equityChart"></canvas>
                        <div class="chart-empty" id="equityEmpty">داده‌ای برای نمایش وجود ندارد</div>
                    </div>
                </div>

                <div class="card" style="margin-top:16px">
                    <div class="card-title"><i class="ti ti-list"></i>آخرین تریدها</div>
                    <div id="tradesList"></div>
                </div>
            </div>

            <div class="card calculator">
                <div class="card-title"><i class="ti ti-calculator"></i>محاسبه حجم پوزیشن</div>
                <div class="form-group"><label>پورتفولیو</label><select id="calcPortfolio"><option value="">در حال بارگذاری...</option></select></div>
                <div class="form-group"><label>درصد ریسک (%)</label><input type="number" id="calcRisk" value="2" step="0.1"></div>
                <div class="form-group"><label>قیمت ورود</label><input type="number" id="calcEntry" placeholder="مثال: 61200"></div>
                <div class="form-group"><label>حد ضرر (Stop Loss)</label><input type="number" id="calcSL" placeholder="مثال: 59800"></div>
                <div class="form-group"><label>اهرم (Leverage)</label><input type="number" id="calcLeverage" value="1" min="1" step="1"></div>
                <div class="form-group"><label>حد سود (Take Profit)</label><input type="number" id="calcTP" placeholder="اختیاری"></div>
                <button class="btn btn-gold" id="calcBtn" style="width:100%">محاسبه</button>
                <div class="calc-result" id="calcResult" style="display:none">
                    <div class="result-row"><span class="result-label">مقدار ریسک</span><span class="result-val" id="resRiskAmt"></span></div>
                    <div class="result-row"><span class="result-label">حجم پوزیشن</span><span class="result-val" id="resQty"></span></div>
                    <div class="result-row"><span class="result-label">ارزش پوزیشن</span><span class="result-val" id="resPosVal"></span></div>
                    <div class="result-row last"><span class="result-label">نسبت R/R</span><span class="result-val" id="resRR"></span></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
