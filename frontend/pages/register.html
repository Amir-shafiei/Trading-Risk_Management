<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام | TradeRisk</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="logo">TRADE<span>RISK</span></div>
        <p class="auth-subtitle">حساب جدید بسازید</p>

        <div class="alert" id="alert"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>نام و نام خانوادگی</label>
                <input type="text" id="name" placeholder="نام خود را وارد کنید">
            </div>
            <div class="form-group">
                <label>ایمیل</label>
                <input type="email" id="email" placeholder="example@email.com" style="direction:ltr">
            </div>
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" id="username" placeholder="نام کاربری انتخاب کنید">
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" id="password" placeholder="حداقل ۸ کاراکتر">
            </div>
            <div class="form-group">
                <label>تکرار رمز عبور</label>
                <input type="password" id="confirmPassword" placeholder="رمز عبور را تکرار کنید">
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">ثبت‌نام</button>
        </form>

        <p class="auth-link">حساب دارید؟ <a href="/login">وارد شوید</a></p>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/register.js"></script>
</body>
</html>
