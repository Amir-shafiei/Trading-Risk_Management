<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنظیمات | TradeRisk</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/settings.css">
</head>
<body>
<div class="layout">
    <button class="hamburger" id="hamburgerBtn"><i class="ti ti-menu-2"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="logo">TRADE<span>RISK</span></div>
        <nav class="nav">
            <a href="/dashboard" class="nav-item"><i class="ti ti-layout-dashboard"></i>داشبورد</a>
            <a href="/trades" class="nav-item"><i class="ti ti-chart-candle"></i>تریدها</a>
            <a href="/portfolio" class="nav-item"><i class="ti ti-wallet"></i>پورتفولیو</a>
            <a href="/journal" class="nav-item"><i class="ti ti-notebook"></i>ژورنال</a>
            <a href="/badges" class="nav-item"><i class="ti ti-medal"></i>نشان‌ها</a>
            <a href="/news" class="nav-item"><i class="ti ti-calendar-event"></i>تقویم اقتصادی</a>
            <a href="/settings" class="nav-item active"><i class="ti ti-settings"></i>تنظیمات</a>
        </nav>
        <button class="logout-btn" id="logoutBtn"><i class="ti ti-logout"></i>خروج</button>
    </aside>

    <main class="main">
        <div class="topbar">
            <h1 class="page-title">تنظیمات</h1>
        </div>

        <div class="settings-list">

            <!-- Theme -->
            <div class="s-card">
                <div class="s-card-head">
                    <i class="ti ti-palette s-head-icon"></i>
                    <span class="s-head-title">ظاهر</span>
                </div>
                <div class="s-card-body">
                    <div class="theme-switch">
                        <button class="theme-opt active" data-theme="dark" id="darkBtn"><i class="ti ti-moon"></i><span>تاریک</span></button>
                        <button class="theme-opt" data-theme="light" id="lightBtn"><i class="ti ti-sun"></i><span>روشن</span></button>
                    </div>
                </div>
            </div>

            <!-- Risk Limits -->
            <div class="s-card">
                <div class="s-card-head">
                    <i class="ti ti-shield s-head-icon"></i>
                    <span class="s-head-title">محدودیت‌های ریسک</span>
                </div>
                <div class="s-card-body">
                    <div class="s-field">
                        <label class="s-label">پورتفولیو</label>
                        <select class="s-input" id="riskPortfolio"></select>
                    </div>
                    <div class="s-field-row">
                        <div class="s-field">
                            <label class="s-label">حداکثر ضرر روزانه</label>
                            <div class="s-input-wrap">
                                <span class="s-input-prefix">$</span>
                                <input class="s-input s-input-num" type="number" id="dailyLossLimit" placeholder="0" min="0" step="10">
                            </div>
                        </div>
                        <div class="s-field">
                            <label class="s-label">حداکثر پوزیشن باز</label>
                            <input class="s-input s-input-num" type="number" id="maxOpenTrades" placeholder="0" min="0" step="1">
                        </div>
                    </div>
                    <div class="s-hint"><i class="ti ti-info-circle"></i> مقدار ۰ به معنای بدون محدودیت است</div>
                    <button class="s-btn-primary" id="saveRiskLimits"><i class="ti ti-device-floppy"></i>ذخیره محدودیت‌ها</button>
                </div>
            </div>

            <!-- Security -->
            <div class="s-card">
                <div class="s-card-head">
                    <i class="ti ti-lock s-head-icon"></i>
                    <span class="s-head-title">امنیت</span>
                </div>
                <div class="s-card-body">
                    <div class="s-field">
                        <label class="s-label">رمز عبور فعلی</label>
                        <input class="s-input" type="password" id="oldPassword" placeholder="رمز فعلی را وارد کنید">
                    </div>
                    <div class="s-field">
                        <label class="s-label">رمز عبور جدید</label>
                        <input class="s-input" type="password" id="newPassword" placeholder="حداقل ۶ کاراکتر">
                    </div>
                    <div class="s-field">
                        <label class="s-label">تکرار رمز عبور جدید</label>
                        <input class="s-input" type="password" id="confirmPassword" placeholder="رمز جدید را دوباره وارد کنید">
                    </div>
                    <button class="s-btn-primary" id="changePasswordBtn"><i class="ti ti-check"></i>تغییر رمز عبور</button>
                </div>
            </div>

            <!-- Checklist -->
            <div class="s-card">
                <div class="s-card-head">
                    <i class="ti ti-checkbox s-head-icon"></i>
                    <span class="s-head-title">چک‌لیست پیش از ترید</span>
                </div>
                <div class="s-card-body">
                    <div class="s-hint" style="margin-top:0;margin-bottom:14px">آیتم‌های زیر هنگام باز کردن ترید جدید نمایش داده می‌شوند.</div>
                    <div id="checklistDefaultsList" class="checklist-items"></div>
                    <div class="s-add-row">
                        <input class="s-input" type="text" id="newChecklistDefault" placeholder="آیتم جدید اضافه کنید...">
                        <button class="s-btn-add" id="addChecklistDefault"><i class="ti ti-plus"></i></button>
                    </div>
                    <button class="s-btn-primary" id="saveChecklistDefaults"><i class="ti ti-device-floppy"></i>ذخیره چک‌لیست</button>
                </div>
            </div>

        </div>
    </main>
</div>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/settings.js"></script>
</body>
</html>
